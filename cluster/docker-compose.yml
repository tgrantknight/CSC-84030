version: "3.8"

services:
  # Hadoop NameNode
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - "9870:9870"  # NameNode Web UI
      - "9000:9000"  # HDFS port
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ../data:/data
    environment:
      - CLUSTER_NAME=hadoop-spark-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark

  # Hadoop DataNode 1
  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    restart: always
    ports:
      - "9864:9864"  # DataNode Web UI
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
      - ../data:/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark
    depends_on:
      - namenode

  # Hadoop DataNode 2
  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    restart: always
    ports:
      - "9865:9864"  # DataNode Web UI
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
      - ../data:/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark
    depends_on:
      - namenode

  # Hadoop DataNode 3
  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode3
    restart: always
    ports:
      - "9866:9864"  # DataNode Web UI
    volumes:
      - hadoop_datanode3:/hadoop/dfs/data
      - ../data:/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark
    depends_on:
      - namenode

  # Hadoop ResourceManager (YARN)
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    restart: always
    ports:
      - "8088:8088"  # ResourceManager Web UI
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 datanode1:9864
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark
    depends_on:
      - namenode
      - datanode1
      - datanode2
      - datanode3

  # Hadoop NodeManager (YARN)
  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    restart: always
    ports:
      - "8042:8042"  # NodeManager Web UI
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 datanode1:9864 resourcemanager:8088
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark
    depends_on:
      - namenode
      - datanode1
      - datanode2
      - datanode3
      - resourcemanager

  # Hadoop History Server
  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    restart: always
    ports:
      - "8188:8188"  # History Server Web UI
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 datanode1:9864 resourcemanager:8088
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    env_file:
      - ./hadoop.env
    networks:
      - hadoop-spark
    depends_on:
      - namenode
      - datanode1
      - datanode2
      - datanode3

  # Spark Master
  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    restart: always
    ports:
      - "8080:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master port
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ../data:/data
      - ../notebooks:/notebooks
    networks:
      - hadoop-spark
    depends_on:
      - namenode

  # Spark Worker 1
  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-1
    restart: always
    ports:
      - "8081:8081"  # Spark Worker 1 Web UI
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ../data:/data
      - ../notebooks:/notebooks
    networks:
      - hadoop-spark
    depends_on:
      - spark-master

  # Spark Worker 2
  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-2
    restart: always
    ports:
      - "8082:8081"  # Spark Worker 2 Web UI
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ../data:/data
      - ../notebooks:/notebooks
    networks:
      - hadoop-spark
    depends_on:
      - spark-master

  # Jupyter Notebook with PySpark
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter-pyspark
    restart: always
    ports:
      - "8888:8888"  # Jupyter Notebook
    volumes:
      - ../notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
    networks:
      - hadoop-spark
    depends_on:
      - spark-master

volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  hadoop_datanode3:
  hadoop_historyserver:

networks:
  hadoop-spark:
    driver: bridge
